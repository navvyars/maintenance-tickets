<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Operations Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f7f6; --surface: #ffffff; --border: #cbd5e1; 
    --text: #1e293b; --muted: #475569; --label: #0f172a;
    --accent: #193652; --highlight: #e8a33d; --highlight-hover: #cf8d2b;
    --radius: 8px; --radius-sm: 6px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: var(--surface);
    padding: 40px;
    border-radius: var(--radius);
    box-shadow: 0 10px 25px rgba(25, 54, 82, 0.1);
    width: 100%; max-width: 400px;
    border-top: 6px solid var(--highlight);
  }
  .login-card h1 { color: var(--accent); font-size: 24px; margin-bottom: 8px; text-align: center; }
  .login-card p { color: var(--muted); font-size: 15px; margin-bottom: 24px; text-align: center; }
  .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; font-weight: 700; color: var(--label); text-transform: uppercase; letter-spacing: 0.5px; }
  input {
    background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 16px; font-size: 16px; width: 100%; transition: all 0.2s;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 16px; font-weight: 700;
    cursor: pointer; border: none; background: var(--highlight); color: #000;
    margin-top: 8px; transition: all 0.2s;
  }
  .btn:hover { background: var(--highlight-hover); }
  .error-msg { color: #991b1b; background: #fef2f2; padding: 12px; border-radius: 6px; font-size: 14px; margin-bottom: 16px; display: none; border: 1px solid #fecdd3; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="login-card">
  <h1>Operations Hub</h1>
  <p>Please log in to access the system.</p>
  
  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required placeholder="team@beehive.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn" id="loginBtn">Log In</button>
  </form>
</div>

<script>
  // Initialize Supabase (Use your actual URL and Anon Key here)
  const SUPABASE_URL = 'https://dccvbgmqsojobkjtnkxm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjY3ZiZ21xc29qb2JranRua3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzA1MTQsImV4cCI6MjA5NzgwNjUxNH0.x6ZJNFa02mXxamFTCRUsfV_KfPPpCKZU5EYFvpdI1og';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Check if already logged in, redirect to hub if true
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'index.html';
  });

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    
    btn.textContent = 'Logging in...';
    btn.disabled = true;
    err.style.display = 'none';

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        // Show the actual error message returning from Supabase
        err.textContent = error.message; 
        err.style.display = 'block';
        btn.textContent = 'Log In';
        btn.disabled = false;
      } else if (data && data.session) {
        // Success! Redirect to main hub
        window.location.href = 'index.html';
      }
    } catch (catchErr) {
      // Catch browser crashes (like local storage blocks or network failures)
      console.error(catchErr);
      err.textContent = 'Browser Error: ' + catchErr.message;
      err.style.display = 'block';
      btn.textContent = 'Log In';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
