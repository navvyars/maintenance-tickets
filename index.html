<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f7f6; 
    --surface: #ffffff; 
    --surface2: #f8fafc;
    --border: #cbd5e1; 
    --text: #1e293b; 
    --muted: #475569; 
    --label: #0f172a;
    --accent: #193652; 
    --accent-hover: #12273b; 
    --accent-dim: rgba(25, 54, 82, 0.08);
    --highlight: #e8a33d; 
    --highlight-hover: #cf8d2b;
    --radius: 8px; 
    --radius-sm: 6px;
  }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  header {
    background: var(--accent);
    border-bottom: 4px solid var(--highlight);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  header h1 { color: #fff; font-size: 22px; font-weight: 700; }
  
  .header-right { margin-left: auto; display: flex; align-items: center; }
  .btn-logout {
    background: transparent;
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 6px 14px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: #ffffff;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .page-title {
    font-size: 15px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin-bottom: 48px;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
  }

  .card {
    background: var(--surface);
    border: 1px solid rgba(226,232,240,0.8);
    border-radius: var(--radius);
    padding: 32px 28px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: all 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    border-top: 4px solid var(--accent);
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(25, 54, 82, 0.1);
    border-color: var(--border);
  }
  .card-icon {
    width: 48px; height: 48px;
    background: var(--accent-dim);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .card-title {
    font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.2px;
  }
  .card-action {
    margin-top: auto;
    font-size: 14px; font-weight: 700;
    color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 6px;
  }

  @media (max-width: 700px) {
    .cards { grid-template-columns: 1fr; }
    .page { padding: 36px 16px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<header>
  <div>
    <h1>Operations Hub</h1>
  </div>
  <div class="header-right">
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>

<div class="page">
  <div class="page-title">Select a module below to submit or manage requests.</div>

  <div class="cards">
    <a class="card" href="./maintenance/index.html">
      <div class="card-icon">🔧</div>
      <div>
        <div class="card-title">Maintenance Tickets</div>
      </div>
      <div class="card-action">Open module →</div>
    </a>

    <a class="card" href="./employee-requests/index.html">
      <div class="card-icon">👤</div>
      <div>
        <div class="card-title">Employee Change Requests</div>
      </div>
      <div class="card-action">Open module →</div>
    </a>

    <a class="card" href="./resident-requests/index.html">
      <div class="card-icon">🏠</div>
      <div>
        <div class="card-title">Resident Change Requests</div>
      </div>
      <div class="card-action">Open module →</div>
    </a>
  </div>
</div>

<script>
  // 1. Initialize Supabase
  const SUPABASE_URL = 'https://dccvbgmqsojobkjtnkxm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjY3ZiZ21xc29qb2JranRua3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzA1MTQsImV4cCI6MjA5NzgwNjUxNH0.x6ZJNFa02mXxamFTCRUsfV_KfPPpCKZU5EYFvpdI1og';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 2. Auth Guard: If not logged in, kick to login.html
  async function checkAuth() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.replace('login.html'); 
    }
  }
  checkAuth();

  // 3. Logout function
  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'login.html'; 
  }
</script>

</body>
</html>
