<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Updated Color Scheme: Navy Blue & Warm Yellow */
    --bg: #f4f7f6; 
    --surface: #ffffff; 
    --surface2: #f8fafc;
    --border: #cbd5e1; 
    --text: #1e293b; 
    --muted: #475569; 
    --label: #0f172a;
    --accent: #193652; /* Dark Navy Blue */
    --accent-hover: #12273b; 
    --accent-dim: rgba(25, 54, 82, 0.08);
    --highlight: #e8a33d; /* Warm Yellow/Orange */
    --highlight-hover: #cf8d2b;
    --radius: 8px; 
    --radius-sm: 6px;
  }
  
  /* Increased base font size for better readability */
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  header {
    background: var(--accent);
    border-bottom: 4px solid var(--highlight);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  header h1 { color: #fff; font-size: 22px; font-weight: 700; }
  header p { color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 2px; }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .page-title {
    font-size: 15px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin-bottom: 48px;
  }
  .page-heading {
    font-size: 32px; font-weight: 800; color: var(--accent);
    letter-spacing: -0.5px; margin-bottom: 8px; text-align: center;
  }
  .page-sub {
    font-size: 16px; color: var(--muted); margin-bottom: 48px; text-align: center;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
  }

  .card {
    background: var(--surface);
    border: 1px solid rgba(226,232,240,0.8);
    border-radius: var(--radius);
    padding: 32px 28px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: all 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    border-top: 4px solid var(--accent);
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(25, 54, 82, 0.1);
    border-color: var(--border);
  }
  .card-icon {
    width: 48px; height: 48px;
    background: var(--accent-dim);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .card-title {
    font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.2px;
  }
  .card-desc {
    font-size: 15px; color: var(--muted); line-height: 1.5;
  }
  .card-action {
    margin-top: auto;
    font-size: 14px; font-weight: 700;
    color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 6px;
  }

  @media (max-width: 700px) {
    .cards { grid-template-columns: 1fr; }
    .page { padding: 36px 16px; }
    .page-heading { font-size: 24px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Operations Hub</h1>
  </div>
</header>

<div class="page">
  <div class="page-title">Select a module below to submit or manage requests.</div>

  <div class="cards">

    <a class="card" href="./maintenance/index.html">
      <div class="card-icon">🔧</div>
      <div>
        <div class="card-title">Maintenance Tickets</div>
      </div>
      <div class="card-action">Open module →</div>
    </a>

    <a class="card" href="./employee-requests/index.html">
      <div class="card-icon">👤</div>
      <div>
        <div class="card-title">Employee Change Requests</div>
      </div>
      <div class="card-action">Open module →</div>
    </a>

    <a class="card" href="./resident-requests/index.html">
      <div class="card-icon">🏠</div>
      <div>
        <div class="card-title">Resident Change Requests</div>
      </div>
      <div class="card-action">Open module →</div>
    </a>

  </div>
</div>

</body>
</html>
